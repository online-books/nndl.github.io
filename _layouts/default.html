<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">主页</a>
        <a href="{{ '/practice/' | relative_url }}">练习</a>
        <a class="nav-gh" href="https://github.com/nndl/nndl.github.io" target="_blank" rel="noopener">
          <svg class="nav-gh-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          <span>GitHub</span>
          <span class="gh-stars" data-gh-stars>
            <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor" aria-hidden="true">
              <path d="M8 .25l2.36 4.78 5.27.77-3.81 3.71.9 5.25L8 12.27l-4.72 2.49.9-5.25L.37 5.8l5.27-.77L8 .25z"/>
            </svg>
            <span data-gh-count>—</span>
          </span>
        </a>
      </nav>
    </div>
  </header>
  <main class="site-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <p>© <a href="https://xpqiu.github.io/">邱锡鹏</a> · <a href="https://github.com/nndl/nndl.github.io">GitHub</a></p>
    </div>
  </footer>
  <script>
    (function () {
      var REPO = 'nndl/nndl.github.io';
      var CACHE_KEY = 'gh-stars-' + REPO;
      var TTL = 10 * 60 * 1000;
      var badge = document.querySelector('[data-gh-stars]');
      var count = document.querySelector('[data-gh-count]');
      if (!badge || !count) return;

      function fmt(n) {
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
        return String(n);
      }
      function show(n) {
        count.textContent = fmt(n);
        badge.classList.add('loaded');
      }
      try {
        var cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || 'null');
        if (cached && Date.now() - cached.t < TTL) { show(cached.n); return; }
      } catch (e) {}

      fetch('https://api.github.com/repos/' + REPO)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || typeof d.stargazers_count !== 'number') return;
          var n = d.stargazers_count;
          try { sessionStorage.setItem(CACHE_KEY, JSON.stringify({ n: n, t: Date.now() })); } catch (e) {}
          show(n);
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
